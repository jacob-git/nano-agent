name: Prompt Budget

on:
  pull_request:
    paths:
      - "prompts/**"
      - "agent-context/**"

jobs:
  prompt-budget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check prompt context budget
        run: |
          npx @pallattu/nano-agent budget \
            --input prompts/support-ticket.json \
            --max-input-tokens 1200 \
            --fail-on-over-budget
