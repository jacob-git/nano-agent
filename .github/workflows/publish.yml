name: Publish

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Check published version
        id: published
        shell: bash
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: steps.published.outputs.already_published == 'false' && env.NODE_AUTH_TOKEN != ''
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Ensure public access
        if: env.NODE_AUTH_TOKEN != ''
        shell: bash
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          npm access set status=public "$PACKAGE_NAME" || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify public registry visibility
        shell: bash
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          PACKAGE_PATH="$(node -p "encodeURIComponent(require('./package.json').name)")"

          for attempt in {1..12}; do
            if curl --fail --silent --show-error "https://registry.npmjs.org/${PACKAGE_PATH}" >/dev/null \
              && npm_config_userconfig=/tmp/nano-agent-empty-npmrc npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version; then
              exit 0
            fi

            echo "Package is not publicly visible yet; retry ${attempt}/12."
            sleep 10
          done

          echo "Package was published but is not publicly visible on the npm registry."
          exit 1

      - name: Missing npm token
        if: steps.published.outputs.already_published == 'false' && env.NODE_AUTH_TOKEN == ''
        run: |
          echo "NPM_TOKEN secret is required to publish."
          exit 1
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
