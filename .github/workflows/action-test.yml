name: Action Test

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  action-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Run local Nano Agent action
        uses: ./
        with:
          input: benchmarks/fixtures/support-ticket.json
          max-input-tokens: 160
          package: "."
